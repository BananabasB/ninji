name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build and Deploy
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest


      - name: Build for Release
        run: |
          xcodebuild \
            -project Ninji.xcodeproj \
            -scheme Ninji \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath Ninji.xcarchive archive

      - name: Export Archive
        run: |
          mkdir -p output
          xcodebuild \
            -exportArchive \
            -archivePath Ninji.xcarchive \
            -exportPath output \
            -exportOptionsPlist ExportOptions.plist

      - name: Create Distribution Package
        run: |
          cd output
          # Create ZIP of the app
          ditto -c -k --sequesterRsrc --keepParent Ninji.app Ninji-${{ github.ref_name }}.zip

          # Create compressed DMG (UDZO)
          # Uses hdiutil to package the app; unsigned. Adjust signing as needed.
          hdiutil create -volname "Ninji" -srcfolder Ninji.app -ov -format UDZO Ninji-${{ github.ref_name }}.dmg

          # Go back to root
          cd ..

      - name: Setup Python for Generating AppCast
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for AppCast Generation
        run: |
          pip install lxml

      - name: Generate AppCast XML
        id: appcast
        run: |
          # Determine tag name and version (strip refs/tags/ prefix)
          REF_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${REF_NAME#v}

          # Paths
          ZIP_FILE="output/Ninji-${REF_NAME}.zip"
          DMG_FILE="output/Ninji-${REF_NAME}.dmg"

          # Get file size if zip exists (may be created later in workflow)
          if [ -f "$ZIP_FILE" ]; then
            FILE_SIZE=$(stat -f%z "$ZIP_FILE")
          else
            FILE_SIZE=0
          fi

          mkdir -p deploy

          # Use base64-encoded Python script to avoid YAML heredoc/implicit-key parsing issues
          PYTHON_B64=""
          echo "$PYTHON_B64" | base64 --decode > /tmp/generate_appcast.py
          python3 /tmp/generate_appcast.py "$VERSION" "$REF_NAME" "$FILE_SIZE" "$GITHUB_REPOSITORY" "$GITHUB_SHA"

          # Expose outputs for subsequent steps
          echo "appcast_path=deploy/appcast.xml" >> $GITHUB_OUTPUT
          echo "zip_path=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "dmg_path=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/Ninji-${{ github.ref_name }}.zip
            output/Ninji-${{ github.ref_name }}.dmg
            deploy/appcast.xml
          name: ${{ github.ref_name }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy AppCast to GitHub Pages (Optional)
        if: false  # Enable if you want to use Pages instead of Releases
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          destination_dir: appcast
