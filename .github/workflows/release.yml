name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Deploy
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'


      - name: Build for Release
        run: |
          xcodebuild \
            -project Ninji.xcodeproj \
            -scheme Ninji \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath Ninji.xcarchive archive

      - name: Export Archive (copy .app from archive)
        run: |
          mkdir -p output
          APP_PATH="Ninji.xcarchive/Products/Applications/Ninji.app"
          echo "Looking for built app at $APP_PATH"
          if [ -d "$APP_PATH" ]; then
            # Copy the .app into output for packaging (avoids needing exportArchive/signing)
            ditto "$APP_PATH" "output/Ninji.app"

            # Determine version from the tag (REF_NAME like v0.2.1)
            REF_NAME=${GITHUB_REF#refs/tags/}
            VERSION=${REF_NAME#v}

            # Ensure CFBundleShortVersionString exists and is set to the release version
            INFO_PLIST="output/Ninji.app/Contents/Info.plist"
            if /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST" >/dev/null 2>&1; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$INFO_PLIST" || true
            else
              /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$INFO_PLIST" || true
            fi

            # Ad-hoc sign the app (no Sparkle framework to worry about on macOS 26+)
            echo "Ad-hoc signing output/Ninji.app"
            codesign --force --options runtime --sign - "output/Ninji.app"
            codesign --verify --deep --strict --verbose=4 "output/Ninji.app"

          else
            echo "ERROR: built app not found in archive"
            ls -la Ninji.xcarchive || true
            exit 1
          fi

      - name: Create Distribution Package
        run: |
          # Ensure output exists
          mkdir -p output

          # Create ZIP of the app (used by appcast and releases)
          ditto -c -k --sequesterRsrc --keepParent output/Ninji.app output/Ninji-${{ github.ref_name }}.zip

          # Create a user-friendly DMG without a background image (icons only)
          # Use npx to run create-dmg without requiring global install
          # Coordinates are non-retina: icon 128px at (140,120), Applications link at (420,120)
          npx --yes create-dmg "output/Ninji.app" \
            --overwrite \
            --out output \
            --icon-size 128 \
            --icon "Ninji.app" 140 120 \
            --app-drop-link 420 120 \
            || {
              echo "create-dmg failed; falling back to hdiutil"
              cd output
              hdiutil create -volname "Ninji" -srcfolder Ninji.app -ov -format UDZO Ninji-${{ github.ref_name }}.dmg
              cd ..
            }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/Ninji-${{ github.ref_name }}.zip
            output/Ninji-${{ github.ref_name }}.dmg
          name: ${{ github.ref_name }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
